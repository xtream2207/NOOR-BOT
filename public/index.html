<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOOR-X</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
  color: white;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 400px;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 0 20px rgba(0,255,255,0.2);
}

input, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(90deg, cyan, purple);
  color: white;
  font-weight: bold;
}

.copy-btn {
  background: green;
}

.hidden {
  display: none;
}

.step {
  text-align: left;
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h2>NOOR-X PAIRING</h2>

    <input id="number" placeholder="+256XXXXXXXXX">
    <button onclick="pair()">Generate Pair Code</button>

    <h3 id="code"></h3>
    <button class="copy-btn hidden" id="copyBtn" onclick="copyCode()">Copy Code</button>

    <p id="status">Ready...</p>

    <hr>

    <button id="sessionBtn" class="hidden" onclick="getSession()">Generate Session</button>
    <textarea id="session" rows="5"></textarea>

    <h3>How to Pair</h3>
    <div class="step">1. Open WhatsApp</div>
    <div class="step">2. Go to Linked Devices</div>
    <div class="step">3. Tap "Link with phone number"</div>
    <div class="step">4. Enter the code from this page</div>

  </div>
</div>

<script>
let paired = false;

async function pair() {
  const number = document.getElementById("number").value;

  document.getElementById("status").innerText = "Generating...";

  const res = await fetch("/pair", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ number })
  });

  const data = await res.json();

  if (data.code) {
    document.getElementById("code").innerText = data.code;
    document.getElementById("copyBtn").classList.remove("hidden");
    document.getElementById("sessionBtn").classList.remove("hidden");
    document.getElementById("status").innerText = "Enter code in WhatsApp";
    paired = true;
  } else {
    document.getElementById("code").innerText = data.error;
    document.getElementById("status").innerText = "Failed";
  }
}

function copyCode() {
  const code = document.getElementById("code").innerText;
  navigator.clipboard.writeText(code);
  alert("Copied!");
}

async function getSession() {
  if (!paired) return;

  const res = await fetch("/session");
  const data = await res.json();

  document.getElementById("session").value = data.session || data.error;
}
</script>

</body>
</html>
